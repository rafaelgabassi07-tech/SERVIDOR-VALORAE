<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220" role="img" aria-labelledby="title desc">
  <title id="title">VALORAE Proxy Server</title>
  <desc id="desc">Logotipo clean e moderno do VALORAE Proxy Server com símbolo V, nós de dados e gradiente verde.</desc>
  <defs>
    <linearGradient id="valoraeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.55" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="surfaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="18" y="18" width="684" height="184" rx="42" fill="url(#surfaceGradient)"/>
  <g filter="url(#softShadow)">
    <rect x="52" y="42" width="136" height="136" rx="38" fill="#0f172a"/>
    <path d="M84 78 L119 148 L156 78" fill="none" stroke="url(#valoraeGradient)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="84" cy="78" r="8" fill="#86efac"/>
    <circle cx="119" cy="148" r="8" fill="#22c55e"/>
    <circle cx="156" cy="78" r="8" fill="#14b8a6"/>
    <path d="M88 154 H152" stroke="#334155" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
  </g>
  <g font-family="Inter, Roboto, Arial, sans-serif">
    <text x="222" y="100" font-size="48" font-weight="800" fill="#111827" letter-spacing="1.2">VALORAE</text>
    <text x="224" y="139" font-size="28" font-weight="650" fill="#16a34a" letter-spacing="0.5">Proxy Server</text>
    <text x="224" y="166" font-size="16" font-weight="500" fill="#64748b">Observabilidade • Engine • Dados financeiros em tempo real</text>
  </g>

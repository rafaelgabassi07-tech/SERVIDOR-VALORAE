<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VALORAE Proxy Monitor</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    :root{color-scheme:dark;--bg:#07110d;--card:#0f1d17;--line:#214436;--text:#e9fff5;--muted:#9fc7b5;--ok:#5dffae;--warn:#ffd166;--bad:#ff6b6b}
    *{box-sizing:border-box}body{margin:0;font:15px/1.45 Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#153b2c,var(--bg) 46%);color:var(--text)}
    header{padding:32px 20px 12px;max-width:1180px;margin:auto}h1{font-size:clamp(28px,4vw,48px);margin:0}.sub{color:var(--muted);max-width:760px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;max-width:1180px;margin:18px auto;padding:0 20px}.card{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025));border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.20)}.span2{grid-column:span 2}.span4{grid-column:span 4}.label{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}.value{font-size:24px;font-weight:800;margin-top:6px}.ok{color:var(--ok)}.warn{color:var(--warn)}pre{white-space:pre-wrap;word-break:break-word;background:#06100c;border-radius:14px;border:1px solid #183527;padding:14px;max-height:360px;overflow:auto}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 10px;margin:5px 6px 0 0;color:var(--muted)}button{background:#c6ffe2;color:#062015;border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}@media(max-width:800px){.grid{grid-template-columns:1fr}.span2,.span4{grid-column:auto}}
  </style>
</head>
<body>
  <header>
    <div class="label">Monitor operacional</div>
    <h1>VALORAE Proxy</h1>
    <p class="sub">Painel enxuto para validar contrato mobile, saúde, cache e disponibilidade sem depender de rotas pesadas escondidas.</p>
  </header>
  <main class="grid">
    <section class="card"><div class="label">Status</div><div id="status" class="value warn">verificando</div></section>
    <section class="card"><div class="label">Versão</div><div id="version" class="value">—</div></section>
    <section class="card"><div class="label">Contrato</div><div id="contract" class="value">—</div></section>
    <section class="card"><div class="label">Cache</div><div id="cache" class="value">—</div></section>
    <section class="card span2"><div class="label">Rotas principais</div><div id="routes"></div></section>
    <section class="card span2"><div class="label">Ações</div><p><button onclick="runContract()">Testar contrato mobile</button></p><pre id="contractOut">Clique para testar.</pre></section>
    <section class="card span4"><div class="label">Health</div><pre id="raw">Carregando...</pre></section>
  </main>
<script>
async function json(url, opts){const r=await fetch(url,opts);return r.json()}
async function load(){try{const h=await json('/api/v1/health');const m=await json('/api/v1/manifest');const c=await json('/api/v1/cache/stats');status.textContent=h.status||'OK';status.className='value ok';version.textContent=h.version||m.version||'—';contract.textContent=m.contract||'—';cache.textContent=(c.cache?.entries||0)+' entradas';routes.innerHTML=(m.endpoints||[]).slice(0,12).map(x=>'<span class="pill">'+x+'</span>').join('');raw.textContent=JSON.stringify({health:h,manifest:m,cache:c},null,2)}catch(e){status.textContent='erro';status.className='value';raw.textContent=e.message}}
async function runContract(){contractOut.textContent='Testando...';const body={positions:[{ticker:'PETR4',quantity:100,avgPrice:30,currentPrice:32,firstPurchaseDate:'2024-01-02'}],includeAnalysis:true,includeHistory:true,includeIpca:false,includeDividends:false,includeRankings:false};const r=await json('/api/v1/mobile/portfolio-sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});contractOut.textContent=JSON.stringify(r,null,2)}
load();
</script>
</body>
</html>

  <script>
    (() => {
      const APP_STORAGE_VERSION = '21.5.13-header-mobile-desktop-fix';
      try {
        const previous = localStorage.getItem('valorae-app-version');
        if (previous !== APP_STORAGE_VERSION) {
          for (const key of Object.keys(localStorage)) {
            if (key.startsWith('valorae-') && key !== 'valorae-theme') localStorage.removeItem(key);
          }
          localStorage.setItem('valorae-app-version', APP_STORAGE_VERSION);
        }
        const saved = localStorage.getItem('valorae-theme');
        const preferred = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        const safeTheme = saved === 'dark' || saved === 'light' ? saved : preferred;
        if (saved && saved !== safeTheme) localStorage.removeItem('valorae-theme');
        document.documentElement.dataset.theme = safeTheme;
      } catch {
        document.documentElement.dataset.theme = 'light';
      }
    })();

  <script>
  (() => {
    const $ = id => document.getElementById(id);
    const icons = {

      logs:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>'
    };
    const pages = [
      ['overview','Visão Geral','Resumo operacional do canal Proxy'],
      ['traffic','Tráfego','Requests, métodos, status, payloads e protocolos'],
      ['delivery','Entrega','Dados, arquivos e bytes enviados aos usuários'],
      ['performance','Desempenho','Latência, erros, throughput e conexões'],
      ['upstreams','Upstreams','Rotas, destinos e famílias de endpoints'],
      ['clients','Clientes','Apps consumidores, tokens e user agents'],
      ['security','Segurança','CORS, autenticação, bloqueios e IPs anonimizados'],
      ['ratelimit','Rate Limit','Bloqueios, timeouts e circuit breaker'],
      ['infrastructure','Infraestrutura','Processo Node, memória, CPU, sockets e saúde'],
      ['selftest','Teste Real','Execute chamadas reais contra o servidor e observe as métricas'],
      ['technology','Tecnologia e Integração','Arquitetura, scraping VALORAE, contrato HTTP/JSON e guia para IA'],
      ['settings','Configurações','Preferências locais do app, cache visual e exportação de diagnóstico'],
      ['logs','Logs','Stream compacto de eventos capturados']
    ];
    let periodMinutes = 60;
    let currentPage = (location.hash || '#overview').slice(1);
    if (!pages.some(([id]) => id === currentPage)) currentPage = 'overview';
    let latest = null;
    let timer;
    let deferredInstallPrompt = null;
    let selfTestState = { running:false, results:[], lastStartedAt:null, lastFinishedAt:null, error:null };
    let autoRefresh = localStorage.getItem('valorae-auto-refresh') !== 'false';
    let refreshEveryMs = Number(localStorage.getItem('valorae-refresh-ms') || 5000);
    if (![5000,15000,30000,60000].includes(refreshEveryMs)) refreshEveryMs = 5000;
    let copyToastTimer;

    function esc(v){return String(v ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    function nf(v, compact=true){const n=Number(v||0);return new Intl.NumberFormat('pt-BR',{notation:compact&&Math.abs(n)>=10000?'compact':'standard',maximumFractionDigits:n%1?2:0}).format(n);}
    function pct(v){if(v===null||v===undefined||Number.isNaN(Number(v)))return 'não medido';return `${Number(v||0).toLocaleString('pt-BR',{maximumFractionDigits:2})}%`;}
    function ms(v){return `${nf(v,false)} ms`;}
    function bytes(v){let n=Number(v||0),u=['B','KB','MB','GB','TB'],i=0;while(n>=1024&&i<u.length-1){n/=1024;i++;}return `${n>=10||i===0?Math.round(n):n.toFixed(1)} ${u[i]}`;}
    function bps(v){return `${bytes(v)}/s`;}
    function timeAgo(iso){if(!iso)return 'nunca';const d=(Date.now()-new Date(iso).getTime())/1000;if(d<60)return `${Math.max(0,Math.round(d))}s atrás`;if(d<3600)return `${Math.round(d/60)}min atrás`;return new Date(iso).toLocaleString('pt-BR');}

    function statusBadge(v){const n=Number(v||0);return `<span class="badge ${n>=5?'err':n>0?'warn':'ok'}">${pct(n)}</span>`;}

    function card(title, subtitle, body, extra=''){return `<section class="card ${extra}"><div class="card-header"><div><h3>${esc(title)}</h3>${subtitle?`<div class="eyebrow">${esc(subtitle)}</div>`:''}</div><span class="badge">real-time</span></div>${body}</section>`;}
    function metricCard(label, sub, value, iconClass='blue', sparkValues=[], color='var(--blue)', foot='') {return `<section class="card"><div class="card-header"><div><div class="eyebrow">${esc(sub)}</div><h3>${esc(label)}</h3></div><span class="icon-badge ${iconClass}">●</span></div><div class="metric">${value}</div>${foot?`<div class="subtle">${foot}</div>`:''}<div class="spark">${spark(sparkValues,color)}</div></section>`;}
    function rows(data, cols, emptyMsg){if(!data||!data.length)return empty(emptyMsg);return `<div class="table-wrap" role="region" aria-label="Tabela rolável"><table class="table"><thead><tr>${cols.map(c=>`<th>${esc(c.label)}</th>`).join('')}</tr></thead><tbody>${data.map(r=>`<tr>${cols.map(c=>`<td data-label="${esc(c.label)}">${c.render?c.render(r):esc(r[c.key])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}
    function normalize(values){const nums=(values||[]).map(x=>Number(x||0));const max=Math.max(1,...nums);return nums.map((v,i)=>[i,100-(v/max)*88-6]);}
    function spark(values,color='var(--blue)'){const pts=normalize(values);if(pts.length<2)pts.push([1,94]);const d=pts.map(([i,y])=>`${i/(Math.max(1,pts.length-1))*100},${y}`).join(' ');return `<svg viewBox="0 0 100 100" preserveAspectRatio="none" width="100%" height="100%"><polyline points="${d}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/><path d="M0,100 ${d.split(' ').map((p,i)=>(i?'L':'L')+p).join(' ')} L100,100Z" fill="${color}" opacity=".11"/></svg>`;}
    function lineChart(series,opts={}){const all=series.flatMap(s=>s.values||[]).map(Number);const max=Math.max(1,...all);const min=Math.min(0,...all);const range=Math.max(1,max-min);const n=Math.max(2,...series.map(s=>(s.values||[]).length));const svgSeries=series.map(s=>{const vals=s.values&&s.values.length?s.values:[0,0];const pts=vals.map((v,i)=>`${40+i/(Math.max(1,vals.length-1))*720},${210-((Number(v)-min)/range)*170}`).join(' ');return `${opts.area?`<path d="M40,220 L${pts.replaceAll(' ',' L')} L760,220 Z" fill="${s.color}" opacity=".10"/>`:''}<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;}).join('');const legend=series.map(s=>`<span><i style="background:${s.color}"></i>${esc(s.name)}</span>`).join('');return `<div class="chart"><svg viewBox="0 0 800 250" width="100%" height="100%"><defs><pattern id="grid" width="80" height="40" patternUnits="userSpaceOnUse"><path d="M80 0H0V40" fill="none" stroke="currentColor" opacity=".08"/></pattern></defs><rect x="40" y="20" width="720" height="200" rx="10" fill="url(#grid)"/>${svgSeries}</svg></div><div class="eyebrow" style="display:flex;gap:14px;flex-wrap:wrap">${legend.replaceAll('<i','<i style="display:inline-block;width:10px;height:10px;border-radius:99px;margin-right:5px;"')}</div>`;}
    function donut(items,center){const colors=['var(--green)','var(--blue)','var(--orange)','var(--red)','var(--purple)','var(--teal)'];const total=(items||[]).reduce((s,x)=>s+Number(x.value||0),0);if(!total)return empty('Sem distribuição registrada nesta janela.');let offset=25;const circles=items.map((x,i)=>{const val=Number(x.value||0)/total*100;const c=`<circle cx="60" cy="60" r="44" fill="none" stroke="${colors[i%colors.length]}" stroke-width="18" stroke-dasharray="${val} ${100-val}" stroke-dashoffset="${offset}"/>`;offset-=val;return c;}).join('');return `<div class="donut-wrap"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="44" fill="none" stroke="var(--surface-high)" stroke-width="18"/>${circles}<text x="60" y="56" text-anchor="middle" font-size="12" fill="currentColor" font-weight="900">${esc(center)}</text><text x="60" y="74" text-anchor="middle" font-size="11" fill="currentColor">Total</text></svg><div class="legend">${items.map((x,i)=>`<div class="legend-item"><span class="swatch" style="background:${colors[i%colors.length]}"></span><span>${esc(x.name)}</span><b>${x.percent!==undefined?pct(x.percent):nf(x.value)}</b></div>`).join('')}</div></div>`;}
    function bars(items,color='blue'){if(!items||!items.length)return empty('Sem dados registrados.');const total=items.reduce((s,x)=>s+Number(x.value||0),0)||1;return items.map(x=>{const p=x.percent!==undefined?Number(x.percent||0):(Number(x.value||0)/total*100);return `<div class="bar-row"><span title="${esc(x.name)}">${esc(x.name)}</span><div class="bar-track"><div class="bar-fill ${color}" style="width:${Math.min(100,p)}%"></div></div><b>${x.percent!==undefined?pct(p):nf(x.value)}</b></div>`;}).join('');}
    function dist(d, path, labels){let cur=d;for(const p of path)cur=cur?.[p];const arr=cur||[];return labels?labels.map(l=>arr.find(x=>x.name===l)||{name:l,value:0,percent:0}):arr;}
    function currentSeries(){return latest?.series || []}
    function seriesValues(key){return currentSeries().map(x=>Number(x[key]||0));}
    function pageNotice(){return `<div class="notice"><span class="badge ok">Métricas reais</span><div><b>Coleta real ativada</b><span class="subtle">O painel mede requisições <code>/api/*</code> por status, método, bytes, latência e content-type. O polling interno do dashboard é excluído para não poluir o tráfego do Proxy.</span></div></div>`;}

    function baseApiUrl(){return `${location.origin}/api`;}
    function endpointUrl(path){return `${baseApiUrl()}${path}`;}
    function runButtonLabel(){return selfTestState.running ? 'Executando teste real...' : 'Executar teste real agora';}
    function selfTestRows(){return selfTestState.results || [];}
    function selfTestStatusClass(item){if(!item)return ''; if(item.ok)return 'ok'; if(item.statusCode && Number(item.statusCode)<500)return 'warn'; return 'err';}
    function selfTestSummary(){const rows=selfTestRows();const ok=rows.filter(x=>x.ok).length;const fail=rows.length-ok;return {total:rows.length,ok,fail};}
    function publicVersion(value){const raw=String(value||'21.5.13');const m=raw.match(/\d+\.\d+\.\d+/);return m?m[0]:raw;}
    function setAutoRefresh(value){autoRefresh=Boolean(value);localStorage.setItem('valorae-auto-refresh',String(autoRefresh));restartTimer();render();}
    function setRefreshIntervalMs(value){refreshEveryMs=Number(value||5000);localStorage.setItem('valorae-refresh-ms',String(refreshEveryMs));restartTimer();render();}
    function restartTimer(){clearInterval(timer);if(autoRefresh)timer=setInterval(load,refreshEveryMs);}
    function currentTheme(){return document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';}

      produto:'Valorae Proxy',versao:publicVersion(latest?.version||'21.5.13'),origemDoApp:origin,baseApi:api,

      endpoints:{health:`${api}/health`,ready:`${api}/ready`,openapi:`${api}/openapi`,fields:`${api}/fields`,asset:`${api}/asset?ticker=PETR4&mode=basic&view=compact`,assets:`${api}/assets?tickers=PETR4,VALE3`,portfolioAnalyze:`${api}/portfolio/analyze`,observability:`${api}/observability?minutes=60`},
      contrato:{protocolo:'HTTP/JSON',cors:'O Proxy responde CORS para navegadores; em produção use allowlist por variável de ambiente quando necessário.',respostaParcial:'Trate status PARTIAL, warnings e campos ausentes porque scraping externo pode variar.',erros:'Sempre trate HTTP >= 400 e payloads com error/message.'},

    function getSnippet(id){const api=baseApiUrl();const origin=location.origin||'https://seu-projeto.vercel.app';if(id==='coordinates')return JSON.stringify(integrationCoordinates(),null,2);if(id==='aiPrompt')return aiPromptText();if(id==='integrationPack')return integrationPackText();const snippets={

    function techCode(id,title){return `<div class="code-block"><div class="copy-row"><b>${esc(title)}</b><button type="button" data-copy-id="${esc(id)}">Copiar</button></div><pre><code>${esc(getSnippet(id))}</code></pre></div>`;}
    function toast(message){let el=document.getElementById('copy-toast');if(!el){el=document.createElement('div');el.id='copy-toast';el.className='copy-toast';document.body.appendChild(el);}el.textContent=message;el.classList.add('show');clearTimeout(copyToastTimer);copyToastTimer=setTimeout(()=>el.classList.remove('show'),1800);}
    async function copySnippet(id){const text=getSnippet(id);try{await navigator.clipboard.writeText(text);toast('Copiado para a área de transferência');}catch{toast('Não foi possível copiar automaticamente');}}
    function downloadSnippet(id){const files={aiPrompt:{name:'valorae-proxy-prompt-ia.md',type:'text/markdown;charset=utf-8',text:getSnippet('aiPrompt')},coordinates:{name:'valorae-proxy-coordenadas.json',type:'application/json;charset=utf-8',text:getSnippet('coordinates')},integrationPack:{name:'valorae-proxy-integracao-completa.md',type:'text/markdown;charset=utf-8',text:getSnippet('integrationPack')},env:{name:'valorae-proxy-site-terceiro.env.example',type:'text/plain;charset=utf-8',text:getSnippet('env')}};const file=files[id];if(!file){toast('Arquivo não encontrado');return;}try{const blob=new Blob([file.text],{type:file.type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=file.name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);toast('Download preparado');}catch{toast('Não foi possível gerar o download');}}
    async function copyDiagnostics(){const payload={product:'Valorae Proxy',publicVersion:publicVersion(latest?.version),observabilityVersion:latest?.version,status:latest?.status,generatedAt:latest?.generatedAt,baseApiUrl:baseApiUrl(),windowMinutes:latest?.windowMinutes,totals:latest?.totals,current:latest?.current,liveChecks:latest?.liveChecks,ui:{theme:currentTheme(),autoRefresh,refreshEveryMs}};try{await navigator.clipboard.writeText(JSON.stringify(payload,null,2));toast('Diagnóstico copiado');}catch{toast('Não foi possível copiar o diagnóstico');}}

    function selfTestResults(){const rows=selfTestRows();if(!rows.length)return empty('Nenhum teste executado nesta sessão. Clique em “Executar teste real agora” para gerar tráfego real no servidor.');return `<div class="test-grid">${rows.map(r=>`<div class="test-card ${selfTestStatusClass(r)}"><div class="test-head"><b>${esc(r.label)}</b><span class="badge ${r.ok?'ok':Number(r.statusCode)<500?'warn':'err'}">${esc(r.statusCode||'erro')}</span></div><code>${esc(r.method)} ${esc(r.url)}</code><span class="subtle">${r.ok?'Resposta válida recebida':esc(r.error||'falha')} · ${ms(r.latencyMs||0)} · ${bytes(r.bytes||0)}</span></div>`).join('')}</div>`;}
    const renderers = {

        ${metricCard('Taxa de erro','Status HTTP >= 400',pct(d.current?.errorRate),'red',err,'var(--red)',`${nf(d.totals?.errors,false)} erros no total`)}
        ${metricCard('Throughput','Entrada + saída',`${bps((d.current?.throughputInBytesPerSecond||0)+(d.current?.throughputOutBytesPerSecond||0))}`,'purple',seriesValues('outboundBytes'),'var(--purple)',`${bps(d.current?.throughputInBytesPerSecond||0)} in · ${bps(d.current?.throughputOutBytesPerSecond||0)} out`)}
      </div><div class="grid chart-grid">
        ${card('Volume de requests','Série temporal real',lineChart([{name:'Requests',values:req,color:'var(--blue)'}],{area:true}))}
        ${card('Latência','Média, P95 e P99',lineChart([{name:'Média',values:avg,color:'var(--green)'},{name:'P95',values:seriesValues('latencyP95Ms'),color:'var(--purple)'},{name:'P99',values:seriesValues('latencyP99Ms'),color:'var(--orange)'}]))}
      </div><div class="grid three">
        ${card('Status geral','Derivado de erros reais',`<div class="metric sm">${esc(d.status||'UNKNOWN')}</div><p class="subtle">Último request: ${timeAgo(d.current?.lastRequestAt)}</p>`)}
        ${card('Cache','Headers de resposta observados',donut(dist(d,['distributions','cache'],['hit','miss','bypass']).map(x=>({...x,name:{hit:'Hit',miss:'Miss',bypass:'Bypass'}[x.name]||x.name})),`${pct(d.current?.cacheHitRatio)}`))}
        ${card('Medições não disponíveis','Sem inventar dados',`<div class="mini-list"><div><b>GeoIP</b><br><span class="subtle">${esc(d.measurement?.geolocation?.reason||'não medido')}</span></div><div><b>TLS handshake</b><br><span class="subtle">${esc(d.measurement?.tls?.reason||'não medido')}</span></div><div><b>Fila interna</b><br><span class="subtle">${esc(d.measurement?.queueDepth?.reason||'não há fila')}</span></div></div>`)}
      </div>`;},
      traffic(d){return `<div class="grid three">
        ${card('Códigos HTTP','Distribuição por classe',donut(dist(d,['distributions','status'],['2xx','3xx','4xx','5xx']),nf(d.totals?.completed,false)))}
        ${card('Métodos HTTP','GET, POST, PUT, PATCH...',bars(dist(d,['distributions','methods'],['GET','POST','PUT','PATCH','DELETE','OPTIONS','HEAD']),'blue'))}
        ${card('Protocolos observados','httpVersion e x-forwarded-proto',bars(dist(d,['distributions','protocols']),'teal'))}
      </div><div class="grid chart-grid">
        ${card('Payload de entrada','Content-Length / corpo lido',bars(dist(d,['distributions','payloadIn'],['0 – 1 KB','1 KB – 10 KB','10 KB – 100 KB','100 KB – 1 MB','> 1 MB']),'purple'))}
        ${card('Payload de resposta','Bytes escritos pela resposta',bars(dist(d,['distributions','payloadOut'],['0 – 1 KB','1 KB – 10 KB','10 KB – 100 KB','100 KB – 1 MB','> 1 MB']),'green'))}
      </div><div class="grid two-one">
        ${card('Série de requests','Volume real ao longo do tempo',lineChart([{name:'Requests',values:seriesValues('requests'),color:'var(--blue)'},{name:'Erros',values:seriesValues('errors'),color:'var(--red)'}],{area:true}))}
        ${card('CORS - Origens','Header Origin capturado',bars(d.security?.corsOrigins||[],'blue'))}
      </div>`;},
      delivery(d){const del=d.delivery||{},api=del.apiResponses||{},assets=del.publicAssets||{};return `<div class="grid kpi-grid">
        ${metricCard('Dados via API','Respostas /api/* concluídas',nf(api.requests,false),'blue',seriesValues('requests'),'var(--blue)',bytes(api.bytes||0))}
        ${metricCard('Arquivos públicos','Entregas medidas pelo server.js',nf(assets.completed,false),'green',[(assets.completed||0)],'var(--green)',bytes(assets.bytes||0))}
        ${metricCard('Tipos de resposta','Content-Type reais',nf((api.contentTypes||[]).length,false),'purple',(api.contentTypes||[]).map(x=>x.value),'var(--purple)','API + assets') }
        ${metricCard('Privacidade','Corpos armazenados?',del.privacy?.storesBody?'sim':'não','orange',[0],'var(--orange)','Metadados técnicos apenas')}

      selftest(d){const summary=selfTestSummary();return `<div class="hero-panel"><section class="hero-main"><span class="badge ok">Teste real do servidor</span><h2>Execute chamadas reais e veja o Proxy reagir.</h2><p>Este teste chama endpoints públicos do próprio Valorae Proxy implantado, usando um <code>X-Valorae-Client-Id</code> dedicado. As requisições aparecem nas páginas de Tráfego, Clientes, Entrega, Desempenho e Logs.</p><div class="action-row"><button class="md-button" id="run-self-test" type="button" ${selfTestState.running?'disabled':''}>${runButtonLabel()}</button><button class="md-button secondary" id="open-logs" type="button">Ver logs depois do teste</button><button class="md-button ghost" data-copy-id="curl" type="button">Copiar teste cURL</button></div></section><aside class="hero-side"><div class="hero-stat"><b>${nf(summary.ok,false)}/${nf(summary.total,false)}</b><span>checks concluídos</span></div><div class="hero-stat"><b>${selfTestState.lastFinishedAt?new Date(selfTestState.lastFinishedAt).toLocaleTimeString('pt-BR'):'--'}</b><span>última execução</span></div></aside></div><div class="grid three">${card('O que será testado','Fluxo real HTTP/JSON',`<div class="tech-list"><div class="tech-item"><span class="tech-number">1</span><div><b>Saúde e prontidão</b><br><span class="subtle">GET /api/health e GET /api/ready validam o runtime.</span></div></div><div class="tech-item"><span class="tech-number">2</span><div><b>Contrato e catálogo</b><br><span class="subtle">GET /api/fields e GET /api/openapi validam dados técnicos do Proxy.</span></div></div><div class="tech-item"><span class="tech-number">3</span><div><b>Consumo real de dados</b><br><span class="subtle">GET /api/asset e POST /api/portfolio/analyze simulam apps terceiros consumindo dados.</span></div></div></div>`)}${card('Impacto esperado','Onde observar depois',`<div class="mini-list"><div><b>Clientes</b><br><span class="subtle">Aparece como <code>ui-selftest</code>.</span></div><div><b>Tráfego</b><br><span class="subtle">Aumenta métodos, status, content-types e bytes.</span></div><div><b>Logs</b><br><span class="subtle">Cada chamada gera evento com status e latência.</span></div></div>`)}${card('Base atual','Servidor implantado',`<code>${esc(baseApiUrl())}</code><div class="action-row"><button class="md-button secondary" data-copy-id="endpoints" type="button">Copiar URLs principais</button></div>`)} </div>${card('Resultado da última execução','Status, latência e tamanho de resposta',selfTestResults())}`;},
      technology(d){return `<div class="hero-panel tech-hero"><section class="hero-main"><span class="badge ok">Tecnologia e Integração</span><h2>Documentação prática do Valorae Proxy para integrar apps terceiros com segurança.</h2><p>Esta página reúne a arquitetura do Proxy, o funcionamento do scraping VALORAE, o contrato HTTP/JSON, os headers, endpoints, limites honestos e um prompt completo para copiar ou baixar e entregar a uma IA implementar a integração no seu app.</p><div class="integration-actions"><button class="md-button" data-copy-id="aiPrompt" type="button">Copiar prompt completo para IA</button><button class="md-button secondary" data-download-id="aiPrompt" type="button">Baixar prompt .md</button><button class="md-button secondary" data-download-id="coordinates" type="button">Baixar coordenadas .json</button><button class="md-button ghost" data-download-id="integrationPack" type="button">Baixar pacote de integração</button></div></section><aside class="hero-side"><div class="hero-stat"><b>${esc(baseApiUrl())}</b><span>base atual da API</span></div><div class="hero-stat"><b>${nf(d.totals?.completed,false)}</b><span>requests reais na janela</span></div><div class="hero-stat"><b>${publicVersion(d.version)}</b><span>versão pública do app</span></div></aside></div>

          ${card('Medição honesta do app','O que o painel consegue provar',`<div class="capability-grid"><div class="capability"><span class="tag">medido</span><b>Requests API</b><p>RPS/RPM, método, status, rota, latência, bytes e content-type.</p></div><div class="capability"><span class="tag">medido</span><b>Clientes</b><p>Client id, user-agent, origem CORS, último acesso, erros e limite observado.</p></div><div class="capability"><span class="tag">medido</span><b>Entrega</b><p>Famílias de dados, tipos de resposta e bytes enviados aos consumidores.</p></div><div class="capability"><span class="tag">não inventado</span><b>GeoIP/TLS</b><p>Só aparece quando houver fonte real; caso contrário, fica como não medido.</p></div></div>`)}
        </div>
      `;},
      settings(d){return `<div class="hero-panel"><section class="hero-main"><span class="badge ok">configurações locais</span><h2>Preferências reais do app e diagnóstico do Valorae Proxy.</h2><p>Estas opções não alteram o engine nem exigem banco. Elas controlam a experiência local do painel, limpeza de cache visual e exportação de diagnóstico para suporte/deploy.</p><div class="action-row"><button class="md-button secondary" id="copy-diagnostics" type="button">Copiar diagnóstico</button><button class="md-button ghost" id="clear-ui-state" type="button">Limpar estado local</button></div></section><aside class="hero-side"><div class="hero-stat"><b>${publicVersion(d.version)}</b><span>versão pública</span></div><div class="hero-stat"><b>${autoRefresh?'Ativo':'Pausado'}</b><span>auto-refresh</span></div></aside></div><div class="grid two-one">${card('Preferências do painel','Persistidas no navegador',`<div class="config-list"><div class="config-row"><div><b>Tema visual</b><span>Alterna modo claro e escuro.</span></div><button class="switch ${currentTheme()==='dark'?'on':''}" id="setting-theme" type="button" aria-label="Alternar tema"></button></div><div class="config-row"><div><b>Atualização automática</b><span>Controla o polling de <code>/api/observability</code>.</span></div><button class="switch ${autoRefresh?'on':''}" id="setting-autorefresh" type="button" aria-label="Alternar atualização automática"></button></div><div class="config-row"><div><b>Intervalo de atualização</b><span>Quanto tempo entre leituras do painel.</span></div><select class="select-pill" id="setting-refresh-ms"><option value="5000" ${refreshEveryMs===5000?'selected':''}>5s</option><option value="15000" ${refreshEveryMs===15000?'selected':''}>15s</option><option value="30000" ${refreshEveryMs===30000?'selected':''}>30s</option><option value="60000" ${refreshEveryMs===60000?'selected':''}>60s</option></select></div><div class="config-row"><div><b>Janela atual</b><span>Período usado nos gráficos e rankings.</span></div><b>${Number(d.windowMinutes||periodMinutes)} min</b></div></div>`)}${card('Diagnóstico do runtime','Informações úteis para deploy',`<div class="mono-kv"><b>Produto</b><code>Valorae Proxy</code><b>Versão API</b><code>${esc(d.version||'21.5.13')}</code><b>Versão pública</b><code>${publicVersion(d.version)}</code><b>Base API</b><code>${esc(baseApiUrl())}</code><b>Status</b><code>${esc(d.status||'UNKNOWN')}</code><b>Requests</b><code>${nf(d.totals?.completed,false)}</code><b>Erros</b><code>${nf(d.totals?.errors,false)}</code><b>Gerado em</b><code>${esc(d.generatedAt||'--')}</code></div><div class="separator"></div><div class="doc-callout"><b>Observação:</b> configurações de servidor como CORS estrito, rate limit e TTL devem ser feitas por variáveis de ambiente no deploy. Esta página controla apenas preferências locais do aplicativo visual.</div>`)}</div><div class="grid three">${card('Ações rápidas','Operação segura',`<div class="mini-list"><button class="md-button" id="settings-run-test" type="button">Executar teste real</button><button class="md-button secondary" id="install-pwa" type="button">Instalar app</button><button class="md-button secondary" id="settings-open-tech" type="button">Abrir documentação de tecnologia</button><button class="md-button ghost" id="settings-export-json" type="button">Copiar snapshot JSON</button></div>`)}${card('Cache e estado local','Evita conflito de deploy antigo',`<div class="mini-list"><div><b>localStorage versionado</b><br><span class="subtle">O app limpa chaves antigas <code>valorae-*</code> quando a versão visual muda.</span></div><div><b>Service workers antigos</b><br><span class="subtle">Registros e caches relacionados a Valorae/Proxy são removidos ao abrir o app.</span></div><div><b>Botão de limpeza</b><br><span class="subtle">Use “Limpar estado local” se substituir outro projeto no mesmo domínio.</span></div></div>`)}${card('Status clicável','Nada decorativo',`<div class="mini-list"><div><b>Botão “Operacional” no topo</b><br><span class="subtle">Abre Infraestrutura para verificar health/ready reais.</span></div><div><b>Botão de engrenagem no topo</b><br><span class="subtle">Abre esta página de Configurações ao lado do botão de tema.</span></div><div><b>Teste Real</b><br><span class="subtle">Use a página dedicada para gerar tráfego real e validar o Proxy.</span></div></div>`)}</div>`;},
      logs(d){return `<div class="grid two-one">${card('Log stream - eventos recentes','Capturados pelo Proxy',rows(d.events||[],[{label:'Hora',render:r=>new Date(r.time).toLocaleTimeString('pt-BR')},{label:'Nível',render:r=>`<span class="badge ${r.level==='ERROR'?'err':r.level==='WARN'?'warn':'ok'}">${esc(r.level)}</span>`},{label:'Cliente',render:r=>esc(r.client)},{label:'Método',render:r=>esc(r.method)},{label:'Rota',render:r=>`<code>${esc(r.route)}</code>`},{label:'Status',render:r=>esc(r.status)},{label:'Latência',render:r=>ms(r.latencyMs)},{label:'Bytes',render:r=>bytes(r.bytes)},{label:'Mensagem',render:r=>esc(r.message)}]))}${card('Status badges','Saúde resumida',`<div class="footer-badges">${(d.badges||[]).map(b=>`<div class="status-tile ${b.status==='Operacional'?'':'warn'}"><span>${esc(b.name)}</span><small>${esc(b.status)}</small></div>`).join('')}</div><hr style="border:0;border-top:1px solid var(--outline-variant);margin:16px 0"><div class="clock">${new Date().toLocaleTimeString('pt-BR')}</div><span class="subtle">${new Date().toLocaleDateString('pt-BR')} · local</span>`)}</div>`;}
    };
    function eventList(events){if(!events||!events.length)return empty('Nenhum evento de alerta nesta janela.');return `<div class="mini-list">${events.map(e=>`<div class="event ${e.level==='ERROR'?'error':e.level==='WARN'?'warn':''}"><span class="level"></span><div><b>${esc(e.event)}</b><br><span class="subtle">${esc(e.message)}</span></div><small>${new Date(e.time).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</small></div>`).join('')}</div>`;}

    const navGroups = [
      ['Monitoramento', ['overview','traffic','delivery','performance']],
      ['Operação', ['upstreams','clients','security','ratelimit','infrastructure','logs']],
      ['Ferramentas', ['selftest','technology']]
    ];
    function renderNav(){
      const pageMap = Object.fromEntries(pages.map(page => [page[0], page]));
      $('nav').innerHTML = navGroups.map(([caption, ids]) => `<div class="nav-section"><span class="nav-caption">${caption}</span>${ids.map(id => { const item = pageMap[id]; return `<button data-page="${id}" title="${esc(item?.[1] || id)}" class="${id===currentPage?'active':''}">${icons[id] || ''}<span class="nav-label">${esc(item?.[1] || id)}</span></button>`; }).join('')}</div>`).join('');
      document.querySelectorAll('#nav button').forEach(btn => btn.onclick = () => setPage(btn.dataset.page));
    }
    function setPage(id){currentPage=id;location.hash=id;renderNav();const p=pages.find(x=>x[0]===id);$('page-title').textContent=p[1];$('page-subtitle').textContent=p[2];document.body.classList.remove('drawer-open');render();}
    function canInstallPwa(){ return Boolean(deferredInstallPrompt); }
    async function installPwa(){
      if (!deferredInstallPrompt) { toast('Instalação: use o menu do navegador se o botão ainda não estiver disponível.'); return; }
      const promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;
      try { promptEvent.prompt(); await promptEvent.userChoice; toast('Fluxo de instalação concluído'); }
      catch { toast('Não foi possível abrir o instalador agora'); }
      if (currentPage === 'settings') render();
    }
    function updateChrome(d){const mins=Number(d?.windowMinutes||periodMinutes);$('window-chip').textContent=mins>=1440?`${Math.round(mins/1440)}d`:`${mins} min`;$('updated-chip').textContent=d?.generatedAt?new Date(d.generatedAt).toLocaleTimeString('pt-BR'):'--';$('requests-chip').textContent=nf(d?.totals?.completed,false);const checks=d?.liveChecks||{};const ok=d?.status!=='DEGRADED'&&checks.health?.ok!==false&&checks.ready?.ok!==false;$('status-pill').innerHTML=`<span class="dot ${ok?'':checks.health?.ok===false||checks.ready?.ok===false?'err':'warn'}"></span><span>${ok?'Operacional':'Atenção'}</span>`;const ds=$('drawer-status-dot');if(ds)ds.className=`drawer-status-dot ${ok?'':checks.health?.ok===false||checks.ready?.ok===false?'err':'warn'}`;const dr=$('drawer-requests');if(dr)dr.textContent=nf(d?.totals?.completed,false);const dl=$('drawer-latency');if(dl)dl.textContent=ms(d?.current?.latencyAvgMs||0);const dv=$('drawer-version');if(dv)dv.textContent=`Valorae Proxy · v${publicVersion(d?.version||'21.5.13')} · ${ok?'Operacional':'Atenção'}`;}
    function bindPageActions(){const run=$('run-self-test');if(run)run.onclick=runSelfTest;const logs=$('open-logs');if(logs)logs.onclick=()=>setPage('logs');const go=$('go-selftest');if(go)go.onclick=()=>setPage('selftest');const theme=$('setting-theme');if(theme)theme.onclick=()=>$('theme-toggle').click();const ar=$('setting-autorefresh');if(ar)ar.onclick=()=>setAutoRefresh(!autoRefresh);const rms=$('setting-refresh-ms');if(rms)rms.onchange=()=>setRefreshIntervalMs(rms.value);const clear=$('clear-ui-state');if(clear)clear.onclick=clearUiState;const diag=$('copy-diagnostics');if(diag)diag.onclick=copyDiagnostics;const exp=$('settings-export-json');if(exp)exp.onclick=copyDiagnostics;const st=$('settings-run-test');if(st)st.onclick=()=>{setPage('selftest');runSelfTest();};const tech=$('settings-open-tech');if(tech)tech.onclick=()=>setPage('technology');const install=$('install-pwa');if(install){install.onclick=installPwa;install.disabled=!canInstallPwa();install.title=canInstallPwa()?'Instalar Valorae Proxy':'Use o menu do navegador se o prompt ainda não estiver disponível';}document.querySelectorAll('[data-copy-id]').forEach(btn=>{btn.onclick=()=>copySnippet(btn.dataset.copyId);});document.querySelectorAll('[data-download-id]').forEach(btn=>{btn.onclick=()=>downloadSnippet(btn.dataset.downloadId);});}
    function render(data=latest){if(!data){$('page').innerHTML=empty('Carregando métricas reais do Proxy...');bindPageActions();return;}latest=data;updateChrome(data);const renderer=renderers[currentPage]||renderers.overview;$('page').innerHTML=renderer(data);bindPageActions();}
    const SELF_TEST_STEPS=[
      {label:'Health',method:'GET',url:'/api/health?client=ui-selftest'},
      {label:'Ready',method:'GET',url:'/api/ready?client=ui-selftest'},
      {label:'Catálogo de campos',method:'GET',url:'/api/fields?client=ui-selftest'},
      {label:'Contrato OpenAPI',method:'GET',url:'/api/openapi?client=ui-selftest'},
      {label:'Consulta de ativo',method:'GET',url:'/api/asset?ticker=PETR4&mode=basic&view=compact&client=ui-selftest'},
      {label:'Análise de carteira',method:'POST',url:'/api/portfolio/analyze?client=ui-selftest',body:{view:'compact',assetView:'compact',maxConcurrency:1,positions:[{ticker:'PETR4',quantity:1,avgPrice:30},{ticker:'VALE3',quantity:1,avgPrice:60}]}}
    ];
    async function runSelfTest(){if(selfTestState.running)return;selfTestState={running:true,results:[],lastStartedAt:new Date().toISOString(),lastFinishedAt:null,error:null};render();for(const step of SELF_TEST_STEPS){const started=performance.now();const url=`${step.url}${step.url.includes('?')?'&':'?'}_selftest=${Date.now()}`;const headers={'X-Valorae-Client-Id':'ui-selftest','X-Valorae-Test-Run':'manual','Accept':'application/json'};const options={method:step.method,cache:'no-store',headers};if(step.body){headers['Content-Type']='application/json';options.body=JSON.stringify(step.body);}try{const res=await fetch(url,options);const text=await res.text();let json=null;try{json=text?JSON.parse(text):null;}catch{};selfTestState.results.push({label:step.label,method:step.method,url:step.url,statusCode:res.status,ok:res.ok,latencyMs:Math.round(performance.now()-started),bytes:typeof text==='string'?text.length:0,error:res.ok?'':(json?.error||json?.message||res.statusText||'HTTP não OK')});}catch(error){selfTestState.results.push({label:step.label,method:step.method,url:step.url,statusCode:'erro',ok:false,latencyMs:Math.round(performance.now()-started),bytes:0,error:error.message});}render();await new Promise(resolve=>setTimeout(resolve,160));}selfTestState={...selfTestState,running:false,lastFinishedAt:new Date().toISOString()};await load();render();}
    async function readJson(url,options={}){const res=await fetch(url,options);const text=await res.text();let json={};try{json=text?JSON.parse(text):{};}catch{json={raw:text.slice(0,240)};}if(!res.ok)throw new Error(json?.error||json?.message||`${url} retornou HTTP ${res.status}`);return {statusCode:res.status,json};}
    async function probe(url){try{const out=await readJson(url,{cache:'no-store',headers:{'X-Valorae-Client-Id':'dashboard-ui','X-Valorae-Dashboard-Probe':'1'}});return {ok:true,statusCode:out.statusCode,payload:out.json};}catch(e){return {ok:false,statusCode:'erro',error:e.message};}}
    let loading=false;
    async function load(){if(loading)return;loading=true;try{const headers={'X-Valorae-Client-Id':'dashboard-ui'};const [obs,health,ready]=await Promise.all([readJson(`/api/observability?minutes=${periodMinutes}`,{cache:'no-store',headers}),probe('/api/health'),probe('/api/ready')]);render({...obs.json,liveChecks:{health,ready}});}catch(e){$('status-pill').innerHTML='<span class="dot err"></span><span>Erro</span>';$('page').innerHTML=`<div class="notice warn"><span class="badge err">falha</span><div><b>Não foi possível carregar os dados reais do app.</b><br><span class="subtle">${esc(e.message)}</span></div></div>`;}finally{loading=false;}}
    function setDrawerOpen(open){document.body.classList.toggle('drawer-open',Boolean(open));$('menu-toggle').setAttribute('aria-expanded',String(Boolean(open)));}
    function toggleMenu(){ if (matchMedia('(max-width: 1100px)').matches) setDrawerOpen(!document.body.classList.contains('drawer-open')); else document.body.classList.toggle('drawer-collapsed'); }

    renderNav();setPage(currentPage);
    $('menu-toggle').onclick=toggleMenu;
    $('overlay').onclick=()=>setDrawerOpen(false);
    $('theme-toggle').onclick=()=>{const next=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=next;localStorage.setItem('valorae-theme',next);if(currentPage==='settings')render();};
    document.querySelectorAll('.period').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.period').forEach(b=>b.classList.remove('active'));btn.classList.add('active');periodMinutes=Number(btn.dataset.minutes||60);load();});
    $('refresh').onclick=load;
    $('test-health').onclick=()=>{setPage('selftest');runSelfTest();};
    $('status-pill').onclick=()=>setPage('infrastructure');
    $('open-settings').onclick=()=>setPage('settings');
    addEventListener('keydown',e=>{if(e.key==='Escape')setDrawerOpen(false);});
    addEventListener('resize',()=>{if(!matchMedia('(max-width: 1100px)').matches)setDrawerOpen(false);},{passive:true});
    addEventListener('beforeinstallprompt', event => { event.preventDefault(); deferredInstallPrompt = event; if (currentPage === 'settings') render(); });
    addEventListener('appinstalled', () => { deferredInstallPrompt = null; toast('Valorae Proxy instalado'); if (currentPage === 'settings') render(); });
    if ('serviceWorker' in navigator) addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    load(); restartTimer(); addEventListener('beforeunload',()=>clearInterval(timer));
  })();
  </script>
</body>
